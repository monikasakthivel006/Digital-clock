<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital clock</title>
<style>
        body {
            background: black;
            color: lime;
            font-size: 50px;
            text-align: center;
            margin-top: 20%;
            font-family: Arial;
        }
    </style>
</head>
<body>

<div id="clock"></div>

<script>
function showTime() {
    let date = new Date();
    let time = date.toLocaleTimeString();
    document.getElementById("clock").innerHTML = time;
}
setInterval(showTime, 1000);
</script>

</body>
</html>
